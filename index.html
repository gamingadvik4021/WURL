<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight 666: Monster City Survival</title>
    <style>
        :root {
            --bg-color: #0c0f1d;
            --panel-bg: #161b33;
            --accent-color: #00ffcc;
            --danger-color: #ff3366;
            --text-color: #e2e8f0;
            --warning-color: #ffb703;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            flex-direction: column;
            gap: 15px;
        }

        #copy-shortcut-bar {
            width: 100%;
            max-width: 750px;
            display: flex;
            justify-content: flex-end;
        }

        .copy-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(0, 255, 204, 0.3);
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .game-container {
            background-color: var(--panel-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            margin-top: 0;
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
        }

        .stat span {
            color: var(--accent-color);
            display: block;
            font-size: 14px;
            margin-top: 2px;
        }

        .critical {
            color: var(--danger-color) !important;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .layout {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 15px;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #story-text {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            border-radius: 4px;
            min-height: 120px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .side-panel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
        }

        h3 {
            margin-top: 0;
            color: var(--warning-color);
            font-size: 13px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .inventory-list {
            font-size: 13px;
            margin-bottom: 15px;
        }

        .inventory-item {
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
        }

        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            background: transparent;
            color: var(--text-color);
            border: 1.5px solid var(--text-color);
            padding: 12px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }

        .shop-btn {
            padding: 8px 10px;
            font-size: 12px;
            background: rgba(255, 183, 3, 0.1);
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .shop-btn:hover:not(:disabled) {
            background: var(--warning-color);
            color: #000;
        }

        .shop-btn:disabled, .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .small-btn {
            padding: 6px;
            font-size: 11px;
            border-radius: 4px;
            text-align: center;
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
            width: 100%;
        }
    </style>
</head>
<body>

<div id="copy-shortcut-bar">
    <button class="copy-btn" id="main-copy-trigger">Copy Code</button>
</div>

<div class="game-container">
    <h1>Flight 666: Monster City Survival</h1>
    
    <div class="dashboard">
        <div class="stat">Hull<span id="hull">100%</span></div>
        <div class="stat">Fuel<span id="fuel">100%</span></div>
        <div class="stat">Coins<span id="coins">150</span></div>
        <div class="stat">Passengers<span id="passengers">10</span></div>
        <div class="stat">Zone<span id="zone">Border</span></div>
    </div>

    <div class="layout">
        <div class="main-panel">
            <div id="story-text">Loading simulation data...</div>
            <div class="options-container" id="options-box"></div>
        </div>

        <div class="side-panel">
            <h3>Inventory</h3>
            <div class="inventory-list">
                <div class="inventory-item">🥪 Food: <span id="inv-sandwiches">20</span></div>
                <div class="inventory-item">⚡ EMP: <span id="inv-emp">0</span></div>
                <div class="inventory-item">🔥 Plasma: <span id="inv-plasma">0</span></div>
            </div>
            
            <button class="btn small-btn" onclick="feedPassengers()">Feed Passengers</button>

            <h3 style="margin-top: 15px;">Airdrop Shop</h3>
            <div class="shop-grid">
                <button class="shop-btn" id="shop-emp" onclick="buyItem('emp')"><span>Buy EMP</span> <span>$40</span></button>
                <button class="shop-btn" id="shop-plasma" onclick="buyItem('plasma')"><span>Buy Plasma</span> <span>$60</span></button>
            </div>
        </div>
    </div>
</div>

<script>
    let state = {
        hull: 100,
        fuel: 100,
        coins: 150,
        passengers: 10,
        stage: "start",
        inv: { sandwiches: 20, emp: 0, plasma: 0 }
    };

    const storyData = {
        start: {
            text: "Welcome to Flight 666 over Monster City. Radioactive storm walls lay dead ahead. Choose your vector carefully.",
            zone: "Border",
            options: [
                { text: "Fly directly into storm clouds (Costs 20 Fuel)", next: "storm", fuel: -20, hull: 0 },
                { text: "Dive low through concrete skyscrapers (Takes 15 Damage)", next: "sky", fuel: 0, hull: -15 }
            ]
        },
        storm: {
            text: "Lightning crashes against the fuselage! A massive flying Winged Behemoth locks onto your tail pattern.",
            zone: "Radioactive Stratum",
            options: [
                { text: "Deploy purchased Pacific EMP Torpedo", next: "victory", require: "emp", consume: "emp" },
                { text: "Attempt to evade through the crosswinds (Costs 30 Fuel, 10 Hull)", next: "victory", fuel: -30, hull: -10 }
            ]
        },
        sky: {
            text: "Gargoyle variants smash against the cockpit windows! The pathway forward is blocked by falling structures.",
            zone: "Outer Rim",
            options: [
                { text: "Clear path with Pacific Plasma Cannon", next: "victory", require: "plasma", consume: "plasma" },
                { text: "Brace airframe and crash through blocks (Takes 30 Damage)", next: "victory", fuel: 0, hull: -30 }
            ]
        },
        victory: {
            text: "System Alert: Safe Haven cleared! You successfully piloted the survivors through the hazard zones.",
            zone: "Safe Zone",
            options: []
        },
        over: {
            text: "CRITICAL LOSS: Flight 666 has broken apart or run completely dry. The simulation has ended.",
            zone: "CRASHED",
            options: []
        }
    };

    function updateUI() {
        if (state.hull <= 0 || state.fuel <= 0 || state.passengers <= 0) {
            state.stage = "over";
        }

        document.getElementById("hull").innerText = state.hull + "%";
        document.getElementById("fuel").innerText = state.fuel + "%";
        document.getElementById("coins").innerText = state.coins;
document.getElementById("passengers").innerText = state.passengers + " Alive";document.getElementById("zone").innerText = storyData[state.stage].zone;document.getElementById("inv-sandwiches").innerText = state.inv.sandwiches;document.getElementById("inv-emp").innerText = state.inv.emp;document.getElementById("inv-plasma").innerText = state.inv.plasma;document.getElementById("hull").className = state.hull <= 25 ? "critical" : "";document.getElementById("fuel").className = state.fuel <= 25 ? "critical" : "";document.getElementById("shop-emp").disabled = state.coins < 40;document.getElementById("shop-plasma").disabled = state.coins < 60;}function renderStage() {updateUI();const stage = storyData[state.stage];document.getElementById("story-text").innerText = stage.text;const box = document.getElementById("options-box");box.innerHTML = "";stage.options.forEach(opt => {const btn = document.createElement("button");btn.className = "btn";btn.innerText = opt.text;if (opt.require && state.inv[opt.require] <= 0) {btn.disabled = true;btn.innerText += " (Locked - Missing Item)";}btn.onclick = () => {if (opt.fuel !== undefined) state.fuel += opt.fuel;if (opt.hull !== undefined) state.hull += opt.hull;if (opt.consume) state.inv[opt.consume]--;state.hull = Math.max(0, state.hull);state.fuel = Math.max(0, state.fuel);state.stage = opt.next;renderStage();};box.appendChild(btn);});if (stage.options.length === 0) {const rBtn = document.createElement("button");rBtn.className = "btn";rBtn.innerText = "Restart Simulation";rBtn.onclick = () => {state.hull = 100; state.fuel = 100; state.coins = 150; state.passengers = 10;state.stage = "start"; state.inv = { sandwiches: 20, emp: 0, plasma: 0 };renderStage();};box.appendChild(rBtn);}}function buyItem(item) {if (item === 'emp' && state.coins >= 40) {state.coins -= 40;state.inv.emp++;} else if (item === 'plasma' && state.coins >= 60) {state.coins -= 60;state.inv.plasma++;}updateUI();}function feedPassengers() {if (state.inv.sandwiches > 0) {state.inv.sandwiches--;state.passengers = Math.min(10, state.passengers + 1);updateUI();} else {alert("No food left!");}}// Static source backup container to protect the dynamic state script from breaking on copy extractiondocument.getElementById("main-copy-trigger").onclick = function() {const cleanCode = <!DOCTYPE html>\n + document.documentElement.outerHTML.replace(/class="critical"/g, "");navigator.clipboard.writeText(cleanCode).then(() => {this.innerText = "Copied!";setTimeout(() => this.innerText = "Copy Code", 2000);});};// Run EnginerenderStage();
